name: kernel-cortex

services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - /srv/projects/kernel-services/cortex/qdrant/storage:/qdrant/storage
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml

  ingest-worker:
    image: python:3.12-slim
    profiles:
      - manual
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      CORTEX_COLLECTION: ${CORTEX_COLLECTION:-kernel_evidence}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-http://192.168.50.252:8091/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}
      VECTOR_SIZE: ${VECTOR_SIZE:-1024}
      CORTEX_MAX_CHARS: ${CORTEX_MAX_CHARS:-700}
      CORTEX_OVERLAP: ${CORTEX_OVERLAP:-70}
      CORTEX_BATCH_SIZE: ${CORTEX_BATCH_SIZE:-16}
    volumes:
      - /srv/projects/kernel-services/cortex/ingest:/ingest:ro
      - /srv/projects/kernel-services/cortex/tools:/tools:ro
      - /srv/projects/kernel-services/cortex/logs:/logs
    working_dir: /work
    command:
      - python3
      - /tools/kernel_cortex.py
      - upsert-dir
      - /ingest
      - --max-chars
      - ${CORTEX_MAX_CHARS:-700}
      - --overlap
      - ${CORTEX_OVERLAP:-70}
      - --batch-size
      - ${CORTEX_BATCH_SIZE:-16}

configs:
  qdrant_config:
    content: |
      log_level: INFO
